<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식물헌터 39 - 무작위 퀴즈 버전</title>
    <style>
        :root { 
            --main: #2e7d32; --gold: #ffd700; --bg: #f4f7f4; 
            --wrong: #ff5252; --correct: #4caf50;
        }
        
        body { 
            font-family: 'Noto Sans KR', sans-serif; background: var(--bg); 
            margin: 0; padding: 20px; font-size: 1.5rem; line-height: 1.6;
        }

        header { 
            text-align: center; padding: 30px; background: white; 
            border-radius: 25px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); margin-bottom: 30px; 
        }
        header h1 { font-size: 2.5rem; margin: 0 0 15px 0; color: #1b5e20; }
        #stats { font-size: 1.8rem; color: var(--main); font-weight: bold; }
        
        #plant-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 30px; max-width: 1400px; margin: 0 auto; 
        }

        .plant-card { 
            background: white; border-radius: 20px; overflow: hidden; 
            cursor: pointer; transition: 0.3s; position: relative; 
            border: 5px solid transparent; box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            height: 300px; 
        }
        .plant-card.collected { border-color: var(--gold); background: #fffdf0; }
        .plant-card.collected::after { 
            content: "✅ 수집됨"; position: absolute; top: 15px; right: 15px; 
            background: var(--gold); padding: 5px 15px; border-radius: 12px; 
            font-size: 1.2rem; font-weight: bold; 
        }

        .card-img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        .card-name { padding: 20px; text-align: center; font-weight: bold; font-size: 1.8rem; }

        .modal { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.9); 
            z-index: 1000; justify-content: center; align-items: center; 
        }
        .modal-content { 
            background: white; width: 95%; max-width: 700px; 
            border-radius: 35px; overflow: hidden; position: relative; 
            max-height: 95vh; display: flex; flex-direction: column; 
        }
        
        .modal-photo-area { width: 100%; height: 300px; flex-shrink: 0; border-bottom: 5px solid var(--main); }
        .modal-photo-area img { width: 100%; height: 100%; object-fit: cover; }

        .modal-body { padding: 40px; overflow-y: auto; flex-grow: 1; }
        .modal-body h2 { font-size: 2.5rem; margin-top: 0; color: var(--main); }
        
        .info-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; font-size: 1.5rem; }
        .info-table td { padding: 15px 10px; border-bottom: 1px solid #eee; vertical-align: top; }
        .info-label { font-weight: bold; color: #555; width: 140px; }
        
        .opt-btn { 
            display: block; width: 100%; padding: 20px; margin: 12px 0; 
            border: 3px solid #ddd; border-radius: 20px; background: white; 
            cursor: pointer; text-align: left; font-size: 1.5rem; font-weight: bold;
        }
        .opt-btn:hover { background: #f1f8e9; border-color: var(--main); }

        .action-btn { 
            width: 100%; padding: 25px; background: var(--main); color: white; 
            border: none; border-radius: 20px; font-weight: bold; 
            font-size: 1.8rem; cursor: pointer; margin-top: 15px; 
        }
        
        .close-x { position: absolute; top: 15px; right: 25px; font-size: 60px; color: white; cursor: pointer; text-shadow: 0 0 15px black; z-index: 1001; }
        .score-badge { 
            display: inline-block; background: #e8f5e9; color: var(--main); 
            padding: 8px 20px; border-radius: 15px; font-weight: bold; 
            margin-bottom: 20px; font-size: 1.4rem; border: 2px solid var(--main);
        }
    </style>
</head>
<body>

<header>
    <h1>🌿 초등 6학년 식물 도감</h1>
    <div id="stats">보유한 카드: <span id="count">0</span> / 39</div>
</header>

<div id="plant-grid"></div>

<div id="quiz-modal" class="modal">
    <span class="close-x" onclick="closeModal()">&times;</span>
    <div class="modal-content">
        <div class="modal-photo-area" id="m-photo"></div>
        <div class="modal-body" id="m-body"></div>
    </div>
</div>

    "벚나무": { h: "5~10m", loc: "대한민국, 일본", f: ["봄에 꽃이 한꺼번에 핌", "잎보다 꽃이 먼저", "꽃이 짧게 유지됨"], use: "관상용", etc: "꽃놀이 명소" },

    "할미꽃": { h: "10~40cm", loc: "대한민국", f: ["꽃이 아래로 향함", "씨앗이 흰 털", "봄에 꽃 핌"], use: "약용 식물", etc: "보호 식물" },
    "바나나": { h: "2~9m", loc: "열대 지역", f: ["줄기가 나무처럼 보임", "열매가 무리로 달림", "부드럽고 닮"], use: "식용 과일", etc: "추위에 약함" },
    "감나무": { h: "5~15m", loc: "대한민국", f: ["가을에 감 열림", "잎이 넓음", "단맛 또는 떫은맛"], use: "과수 나무", etc: "오래 사는 나무" },
    "포도나무": { h: "수 m (덩굴)", loc: "대한민국 등", f: ["덩굴 식물", "열매가 송이로 열림", "와인 재료"], use: "과수 나무", etc: "햇빛 필요" },
    "복숭아나무": { h: "3~6m", loc: "중국 원산", f: ["달콤한 열매", "털 있는 과일", "봄에 꽃"], use: "과수 나무", etc: "향이 좋음" },
    "귤나무": { h: "2~5m", loc: "제주도", f: ["겨울에 열매", "껍질 잘 벗겨짐", "비타민C 풍부"], use: "과수 나무", etc: "따뜻한 지역" },
    "밤나무": { h: "10~30m", loc: "대한민국", f: ["가을에 밤 열림", "가시 껍질", "숲에서 자람"], use: "식용, 목재", etc: "가시가 있는 껍질" },
    "자두나무": { h: "3~10m", loc: "중국 원산", f: ["여름 과일", "새콤달콤", "꽃이 먼저 핌"], use: "과수 나무", etc: "여름 대표 과일" },
    "모과나무": { h: "5~10m", loc: "대한민국 등", f: ["향이 강한 열매", "겉면이 단단함", "울퉁불퉁함"], use: "차, 약용", etc: "노란 열매" },
    "대추나무": { h: "5~10m", loc: "대한민국", f: ["작은 열매", "달콤함", "가을 수확"], use: "식용, 약용", etc: "건조에 강함" },
    "석류나무": { h: "3~5m", loc: "이란, 인도", f: ["붉은 열매", "씨앗이 많음", "껍질 단단"], use: "건강식품", etc: "보석 같은 씨앗" }
};

let collected = new Set();
let curP = null, curIdx = 0, curScore = 0;

// 유틸리티: 배열 무작위 섞기
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// 유틸리티: 다른 식물 데이터에서 오답 추출
function getWrongOptions(type, currentName) {
    const names = Object.keys(plantData).filter(name => name !== currentName);
    shuffle(names);
    
    if (type === 'f') return names.slice(0, 2).map(name => plantData[name].f[0]);
    if (type === 'use') return names.slice(0, 2).map(name => plantData[name].use);
    return names.slice(0, 2).map(name => plantData[name].etc);
}

async function getImg(name) {
    try {
        const res = await fetch(`https://ko.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`);
        const data = await res.json();
        return data.thumbnail ? data.thumbnail.source : 'https://via.placeholder.com/500/2e7d32/FFFFFF?text='+name;
    } catch { return 'https://via.placeholder.com/500'; }
}

async function init() {
    const grid = document.getElementById('plant-grid');
    for (let name in plantData) {
        const img = await getImg(name);
        const card = document.createElement('div');
        card.className = 'plant-card';
        card.id = `c-${name}`;
        card.innerHTML = `<img src="${img}" class="card-img"><div class="card-name">${name}</div>`;
        card.onclick = () => showInfo(name, img);
        grid.appendChild(card);
    }
}

function showInfo(name, img) {
    if(collected.has(name)) return;
    const p = plantData[name];
    curP = { name, ...p, img };
    
    document.getElementById('m-photo').innerHTML = `<img src="${img}">`;
    document.getElementById('m-body').innerHTML = `
        <h2>🌿 ${name}</h2>
        <table class="info-table">
            <tr><td class="info-label">키</td><td>${p.h}</td></tr>
            <tr><td class="info-label">사는 곳</td><td>${p.loc}</td></tr>
            <tr><td class="info-label">특징</td><td>• ${p.f.join('<br>• ')}</td></tr>
            <tr><td class="info-label">쓰임</td><td>${p.use}</td></tr>
            <tr><td class="info-label">기타</td><td>${p.etc}</td></tr>
        </table>
        <button class="action-btn" onclick="startQuiz()">도감 등록 도전 (3문제 중 2문제!)</button>
    `;
    document.getElementById('quiz-modal').style.display = 'flex';
}

function startQuiz() {
    curIdx = 0; curScore = 0;
    
    // 퀴즈 데이터 동적 생성 및 셔플
    const quizConfigs = [
        { q: `'${curP.name}'의 특징으로 옳은 것은?`, correct: curP.f[0], wrongs: getWrongOptions('f', curP.name) },
        { q: `'${curP.name}'의 주된 쓰임새(용도)는?`, correct: curP.use, wrongs: getWrongOptions('use', curP.name) },
        { q: `'${curP.name}'에 대한 설명 중 맞는 것은?`, correct: curP.etc, wrongs: getWrongOptions('etc', curP.name) }
    ];

    curP.quizzes = quizConfigs.map(config => {
        const options = [
            { text: config.correct, isCorrect: true },
            { text: config.wrongs[0], isCorrect: false },
            { text: config.wrongs[1], isCorrect: false }
        ];
        shuffle(options);
        return {
            q: config.q,
            a: options.map(o => o.text),
            c: options.findIndex(o => o.isCorrect)
        };
    });

    renderQuiz();
}

function renderQuiz() {
    const q = curP.quizzes[curIdx];
    document.getElementById('m-body').innerHTML = `
        <div class="score-badge">질문 ${curIdx + 1} / 3</div>
        <p style="font-weight:bold; font-size:1.8rem; margin-bottom:25px;">${q.q}</p>
        ${q.a.map((o, i) => `<button class="opt-btn" onclick="check(${i})">${o}</button>`).join('')}
        <p style="font-size:1.2rem; color:#666; margin-top:20px;">* 상단 사진과 도감의 내용을 떠올려보세요!</p>
    `;
}

function check(idx) {
    if(idx === curP.quizzes[curIdx].c) curScore++;
    curIdx++;
    if(curIdx < 3) renderQuiz();
    else finish();
}

function finish() {
    const b = document.getElementById('m-body');
    if(curScore >= 2) {
        b.innerHTML = `
            <div style="text-align:center; padding:20px;">
                <h1 style="color:var(--correct); font-size:3.5rem;">🎉 성공!</h1>
                <p style="font-size:1.8rem;">3문제 중 <b>${curScore}문제</b>를 맞혔습니다!<br>도감에 <b>${curP.name}</b> 카드가 등록되었습니다.</p>
                <button class="action-btn" onclick="closeModal()">확인</button>
            </div>`;
        collected.add(curP.name);
        document.getElementById(`c-${curP.name}`).classList.add('collected');
        document.getElementById('count').innerText = collected.size;
    } else {
        b.innerHTML = `
            <div style="text-align:center; padding:20px;">
                <h1 style="color:var(--wrong); font-size:3.5rem;">😢 실패</h1>
                <p style="font-size:1.8rem;">아쉽네요! 2문제 이상 맞춰야 합니다.<br>(맞힌 개수: ${curScore}개)</p>
                <button class="action-btn" onclick="showInfo('${curP.name}', '${curP.img}')">다시 공부하기</button>
            </div>`;
    }
}

function closeModal() { document.getElementById('quiz-modal').style.display = 'none'; }
init();
</script>
</body>
</html>
